<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 紙電路實作自動化學習單</title>
    <style>
        :root {
            --primary-orange: #ff821a;
            --bg-color: #eef2f7;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            max-width: 640px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            position: relative;
            box-sizing: border-box;
        }

        /* 頂部黃色裝飾條 */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 12px;
            background: linear-gradient(90deg, #ffde6a, #ffb800);
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        .lightbulb {
            font-size: 45px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1e3a5f;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .desc {
            color: #64748b;
            font-size: 15px;
            margin: 0;
        }

        /* 輸入框群組 */
        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .field {
            flex: 1;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 15px;
            color: #334155;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fcfdfe;
            transition: all 0.25s ease;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #ffb800;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(255, 184, 0, 0.1);
        }

        /* LED 顏色選擇按鈕 */
        .color-options {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .color-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            background: #ffffff;
            transition: all 0.2s ease;
        }

        .color-btn:hover {
            background-color: #f8fafc;
        }

        .color-btn.active {
            border-color: #ffb800;
            background-color: #fffdf4;
            color: #b45309;
            box-shadow: 0 4px 12px rgba(255, 184, 0, 0.12);
        }

        /* 發光狀態卡片 */
        .status-options {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .status-card {
            flex: 1;
            padding: 24px;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #ffffff;
        }

        .status-card .emoji {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .status-card b {
            font-size: 16px;
            display: block;
            color: #475569;
        }

        /* 成功亮起樣式 */
        .status-card.active.success {
            border-color: #10b981;
            background: #f0fdf4;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.15);
        }
        .status-card.active.success b {
            color: #047857;
        }

        /* 除錯樣式 */
        .status-card.active.fail {
            border-color: #64748b;
            background: #f8fafc;
            box-shadow: 0 6px 15px rgba(100, 116, 139, 0.1);
        }
        .status-card.active.fail b {
            color: #334155;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* 送出按鈕 */
        button#submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff9233, #ff6600);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 6px 20px rgba(255, 102, 0, 0.25);
            transition: all 0.2s ease;
        }

        button#submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 102, 0, 0.35);
        }

        button#submit:active {
            transform: translateY(1px);
        }

        button#submit:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(255,218,106,0)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(255,218,106,0.8)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(255,218,106,0)); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="lightbulb">💡</div>
        <h1>⚡ 紙電路實作自動化學習單</h1>
        <p class="desc">各位同學，完成點亮 LED 的任務後，請認真填寫以下紀錄表單！</p>
    </div>

    <div class="input-group">
        <div class="field">
            <label>🔢 班級座號</label>
            <input type="text" id="classId" placeholder="請輸入">
        </div>
        <div class="field">
            <label>👤 學生姓名</label>
            <input type="text" id="studentName" placeholder="請輸入">
        </div>
    </div>

    <label>🔴 你使用的 LED 顏色</label>
    <div class="color-options" id="colorPicker">
        <div class="color-btn" onclick="selectColor(this, '紅色')">紅色</div>
        <div class="color-btn" onclick="selectColor(this, '黃色')">黃色</div>
        <div class="color-btn" onclick="selectColor(this, '綠色')">綠色</div>
        <div class="color-btn" onclick="selectColor(this, '藍色')">藍色</div>
    </div>

    <label>✨ 你的電路有沒有順利發光？</label>
    <div class="status-options">
        <div class="status-card" id="s-success" onclick="setStatus(this, '成功亮起來了！', true)">
            <div class="emoji">🎉</div>
            <b>成功亮起來了！</b>
        </div>
        <div class="status-card" id="s-fail" onclick="setStatus(this, '沒亮，需要除錯...', false)">
            <div class="emoji">🔍</div>
            <b>沒亮，需要除錯...</b>
        </div>
    </div>

    <label>💬 遇到什麼困難？（例如：銅箔貼紙斷掉、正負極接反等）或心得反思：</label>
    <textarea id="reflection" rows="3" placeholder="請在此填寫..."></textarea>

    <button id="submit" onclick="sendData()">🚀 送出學習單</button>
</div>

<script>
    let selectedColor = "";
    let isSuccess = "";
    
    // 已自動為您綁定指定的 GAS 後端網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw37XDHkUTZPIBvlqavM20Grg8VJUPNqFv1U4tFHmdcl3ug0NZuNPNawe_0J7HiCT6h0Q/exec";

    function selectColor(element, color) {
        selectedColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
    }

    function setStatus(element, status, ok) {
        isSuccess = status;
        document.querySelectorAll('.status-card').forEach(c => {
            c.classList.remove('active', 'success', 'fail');
        });
        element.classList.add('active', ok ? 'success' : 'fail');
    }

    function sendData() {
        const btn = document.getElementById('submit');
        const classId = document.getElementById('classId').value.trim();
        const studentName = document.getElementById('studentName').value.trim();
        const reflection = document.getElementById('reflection').value.trim();

        if(!classId || !studentName || !selectedColor || !isSuccess) {
            alert("請完整填寫座號、姓名，並選擇 LED 顏色與發光狀態喔！");
            return;
        }

        btn.disabled = true;
        btn.innerText = "傳送中...";

        // 使用 URLSearchParams 標準表單格式封裝資料，防止跨網域傳輸遺失參數
        const formData = new URLSearchParams();
        formData.append('classId', classId);
        formData.append('studentName', studentName);
        formData.append('ledColor', selectedColor);
        formData.append('success', isSuccess);
        formData.append('reflection', reflection);

        fetch(GAS_URL, {
            method: 'POST',
            body: formData,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
        .then(response => {
            alert("🎉 太棒了！你的學習單已成功送出！");
            location.reload(); // 成功後刷新以清空內容
        })
        .catch(error => {
            console.error('Error:', error);
            alert("提交失敗，請檢查網路連線或聯絡老師！");
            btn.disabled = false;
            btn.innerText = "🚀 送出學習單";
        });
    }
</script>

</body>
</html>
