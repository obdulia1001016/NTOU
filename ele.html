<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 創客進階課：紙電路實作自動化學習單</title>
    <style>
        :root {
            --primary-orange: #ff821a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --green-success: #10b981;
            --red-fail: #ef4444;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            max-width: 680px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            position: relative;
            box-sizing: border-box;
        }

        /* 頂部漸層裝飾條 */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 12px;
            background: linear-gradient(90deg, #a855f7, #ff821a);
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
            margin-top: 10px;
        }

        .lightbulb {
            font-size: 45px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
        }

        .desc {
            color: #64748b;
            font-size: 15px;
            margin: 0;
        }

        /* 學生基本資料：黃金佈局 */
        .input-row-half {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .field-full {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 15px;
            color: #334155;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fcfdfe;
            transition: all 0.25s ease;
