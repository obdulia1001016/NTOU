<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 創客進階課：紙電路實作自動化學習單</title>
    <style>
        :root {
            --primary-orange: #ff821a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --green-success: #10b981;
            --red-fail: #ef4444;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            max-width: 680px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            position: relative;
            box-sizing: border-box;
        }

        /* 頂部漸層裝飾條 */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 12px;
            background: linear-gradient(90deg, #a855f7, #ff821a);
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
            margin-top: 10px;
        }

        .lightbulb {
            font-size: 45px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
        }

        .desc {
            color: #64748b;
            font-size: 15px;
            margin: 0;
        }

        /* 學生基本資料佈局 */
        .input-row-half {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .field-full {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 15px;
            color: #334155;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fcfdfe;
            transition: all 0.25s ease;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary-orange);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(255, 130, 26, 0.1);
        }

        /* 顏色選擇按鈕 */
        .color-options {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .color-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            background: #ffffff;
            transition: all 0.2s ease;
        }

        .color-btn.active {
            border-color: var(--primary-orange);
            background-color: #fff7ed;
            color: #c2410c;
            box-shadow: 0 4px 12px rgba(255, 130, 26, 0.1);
        }

        /* 滑桿設計 */
        .range-container {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid var(--border-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .range-slider {
            width: 100%;
            margin: 15px 0;
            accent-color: var(--primary-orange);
        }

        .range-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-orange);
        }

        /* 發光狀態卡片 */
        .status-options {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .status-card {
            flex: 1;
            padding: 20px;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #ffffff;
        }

        .status-card .emoji { font-size: 30px; margin-bottom: 5px; }
        .status-card b { font-size: 16px; display: block; color: #475569; }

        .status-card.active.success {
            border-color: var(--green-success);
            background: #f0fdf4;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.12);
        }
        .status-card.active.success b { color: #047857; }

        .status-card.active.fail {
            border-color: var(--red-fail);
            background: #fef2f2;
            box-shadow: 0 6px 15px rgba(239, 68, 68, 0.12);
        }
        .status-card.active.fail b { color: #b91c1c; }

        /* 動態除錯區塊 */
        .trouble-section {
            display: none;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            animation: fadeIn 0.4s ease;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .checkbox-item input {
            accent-color: var(--red-fail);
            width: 16px; height: 16px;
        }

        .checkbox-item.checked {
            border-color: var(--red-fail);
            background-color: #fff5f5;
        }

        textarea { resize: vertical; min-height: 100px; margin-bottom: 15px; }

        /* 送出按鈕 */
        button#submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff9233, #ff6600);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 102, 0, 0.2);
            transition: all 0.2s ease;
        }

        button#submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 102, 0, 0.3);
        }

        button#submit:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(255,130,26,0)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 8px rgba(255,130,26,0.5)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(255,130,26,0)); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="lightbulb">💡</div>
        <h1>⚡ 紙電路實作自動化學習單 (進階版)</h1>
        <p class="desc">任務完成！請填寫小組實作數據與偵錯歷程</p>
    </div>

    <div class="input-row-half">
        <div class="field">
            <label>🏫 班級</label>
            <input type="text" id="classInput" placeholder="例：701">
        </div>
        <div class="field">
            <label>🔢 座號</label>
            <input type="text" id="seatNumber" placeholder="例：05">
        </div>
    </div>
    <div class="field-full">
        <label>👤 學生姓名</label>
        <input type="text" id="studentName" placeholder="請輸入姓名">
    </div>

    <label>🔴 1. 你使用的 LED 顏色</label>
    <div class="color-options" id="colorPicker">
        <div class="color-btn" onclick="selectColor(this, '紅色')">🔴 紅色</div>
        <div class="color-btn" onclick="selectColor(this, '黃色')">🟡 黃色</div>
        <div class="color-btn" onclick="selectColor(this, '綠色')">🟢 綠色</div>
        <div class="color-btn" onclick="selectColor(this, '藍色')">🔵 藍色</div>
    </div>

    <label>📏 2. 估計你們總共使用了多少「銅箔貼紙」？</label>
    <div class="range-container">
        <input type="range" id="foilLength" class="range-slider" min="5" max="50" value="20" oninput="updateRangeValue(this.value)">
        <div class="range-value"><span id="rangeDisplay">20</span> cm</div>
    </div>

    <label>✨ 3. 你的電路有沒有順利發光？</label>
    <div class="status-options">
        <div class="status-card" id="s-success" onclick="setStatus(this, '成功亮起來了！', true)">
            <div class="emoji">🎉</div>
            <b>成功亮起來了！</b>
        </div>
        <div class="status-card" id="s-fail" onclick="setStatus(this, '沒亮，需要除錯...', false)">
            <div class="emoji">🔍</div>
            <b>沒亮，需要除錯...</b>
        </div>
    </div>

    <div class="trouble-section" id="troubleBox">
        <label>🛠️ 偵錯紀錄：經過檢查，發現是哪裡有問題？（可複選）</label>
        <div class="checkbox-grid">
            <label class="checkbox-item" onclick="toggleCheckbox(this)">
                <input type="checkbox" value="正負極接反"> ❌ LED正負極接反
            </label>
            <label class="checkbox-item" onclick="toggleCheckbox(this)">
                <input type="checkbox" value="銅箔貼紙斷裂"> 🩹 銅箔貼紙中間斷裂
            </label>
            <label class="checkbox-item" onclick="toggleCheckbox(this)">
                <input type="checkbox" value="鈕扣電池沒電/接觸不良"> 🔋 電池沒電或沒壓緊
            </label>
            <label class="checkbox-item" onclick="toggleCheckbox(this)">
                <input type="checkbox" value="轉角未重疊導通"> 📐 轉彎處未確實導通
            </label>
        </div>
    </div>

    <label>💬 4. 實作心得或排錯過程反思：</label>
    <textarea id="reflection" rows="3" placeholder="請在此填寫..."></textarea>

    <button id="submit" onclick="sendData()">🚀 送出學習單</button>
</div>

<script>
    let selectedColor = "";
    let isSuccess = "";
    
    // 已為您自動綁定最新產生的自動分頁版 GAS 後端網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxVNKVNyxLM-WGfIfiQHO9aHlWSurOAeqpWoSS8NMDB2IJJcnorTeNJ62OFT5ZhBYtiuQ/exec";

    function selectColor(element, color) {
        selectedColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
    }

    function updateRangeValue(val) {
        document.getElementById('rangeDisplay').innerText = val;
    }

    function setStatus(element, status, ok) {
        isSuccess = status;
        document.querySelectorAll('.status-card').forEach(c => c.classList.remove('active', 'success', 'fail'));
        element.classList.add('active', ok ? 'success' : 'fail');
        
        const troubleBox = document.getElementById('troubleBox');
        if (!ok) {
            troubleBox.style.display = "block";
        } else {
            troubleBox.style.display = "none";
            document.querySelectorAll('.checkbox-item').forEach(item => {
                item.classList.remove('checked');
                item.querySelector('input').checked = false;
            });
        }
    }

    function toggleCheckbox(element) {
        const cb = element.querySelector('input');
        element.classList.toggle('checked', cb.checked);
    }

    document.querySelectorAll('.checkbox-item input').forEach(input => {
        input.addEventListener('change', function() {
            this.parentElement.classList.toggle('checked', this.checked);
        });
    });

    function sendData() {
        const btn = document.getElementById('submit');
        const classVal = document.getElementById('classInput').value.trim();
        const seatVal = document.getElementById('seatNumber').value.trim();
        const studentName = document.getElementById('studentName').value.trim();
        const foilLength = document.getElementById('foilLength').value;
        const reflection = document.getElementById('reflection').value.trim();

        if(!classVal || !seatVal || !studentName || !selectedColor || !isSuccess) {
            alert("請完整填寫班級、座號、姓名，並選擇 LED 顏色與發光狀態！");
            return;
        }

        btn.disabled = true;
        btn.innerText = "正在飛速傳送中...";

        // 收集除錯複選內容
        let troubleReasons = [];
        document.querySelectorAll('.checkbox-item input:checked').forEach(cb => {
            troubleReasons.push(cb.value);
        });
        
        let finalSuccessStatus = isSuccess;
        if (troubleReasons.length > 0) {
            finalSuccessStatus += ` (原因: ${troubleReasons.join(', ')})`;
        }

        let finalReflection = `[銅箔用量: ${foilLength}cm] ${reflection}`;

        // 使用獨立參數封裝傳送，與自動分頁版後端完美對接
        const formData = new URLSearchParams();
        formData.append('classInput', classVal);   // 傳送純班級，例如："701"
        formData.append('seatNumber', seatVal);   // 傳送純座號，例如："05"
        formData.append('studentName', studentName);
        formData.append('ledColor', selectedColor);
        formData.append('success', finalSuccessStatus);
        formData.append('reflection', finalReflection);

        fetch(GAS_URL, {
            method: 'POST',
            body: formData,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
        .then(response => {
            alert("🎉 太棒了！學習單已成功送出！");
            location.reload();
        })
        .catch(error => {
            console.error('Error:', error);
            alert("提交失敗，請檢查網路連線後再試！");
            btn.disabled = false;
            btn.innerText = "🚀 送出學習單";
        });
    }
</script>

</body>
</html>
